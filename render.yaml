services:
  - type: web
    name: lookup-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # set this manually in Render dashboard
      - key: API_BASE_URL
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: PORT
        generateValue: false # Render sets this automatically
