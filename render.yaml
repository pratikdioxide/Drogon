services:
  - type: web
    name: drogon
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0" 
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        generateValue: false